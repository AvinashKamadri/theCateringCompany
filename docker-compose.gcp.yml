version: '3.9'

# EC2 deployment — frontend on Vercel, Postgres on RDS, everything else here.
# Run: docker compose -f docker-compose.gcp.yml --env-file .env.production up -d --build
# Note: no Redis — job queue uses pg-boss (runs on Postgres/RDS)

services:
  # ─── Backend (NestJS) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      BACKEND_PORT: '3001'
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DOCUSEAL_ENABLED: ${DOCUSEAL_ENABLED:-false}
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:-}
      DOCUSEAL_API_URL: ${DOCUSEAL_API_URL:-https://api.docuseal.co}
      DOCUSEAL_SIGNING_URL: ${DOCUSEAL_SIGNING_URL:-https://docuseal.co}
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-catering-uploads}
      NOTIFICATION_MOCK: ${NOTIFICATION_MOCK:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  # ─── Workers (pg-boss / Puppeteer PDF) ───────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}&connection_limit=5
      NODE_ENV: production
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NOTIFICATION_MOCK: ${NOTIFICATION_MOCK:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    restart: unless-stopped

  # ─── ML Agent (FastAPI / LangGraph) ──────────────────────────────────────
  ml-agent:
    build:
      context: ./ml-agent
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      HOST: 0.0.0.0
      PORT: '8000'
    restart: unless-stopped

volumes:
  uploads_data:
