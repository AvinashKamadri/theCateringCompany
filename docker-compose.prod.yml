version: '3.9'

# Production compose — postgres is RDS, redis is ElastiCache (or managed Redis).
# Run on EC2:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d

services:
  # ─── Backend (NestJS) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: ${DATABASE_URL}          # RDS connection string
      REDIS_URL: ${REDIS_URL}                # ElastiCache or managed Redis
      NODE_ENV: production
      BACKEND_PORT: '3001'
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      # E-signature
      DOCUSEAL_ENABLED: ${DOCUSEAL_ENABLED:-false}
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:-}
      DOCUSEAL_API_URL: ${DOCUSEAL_API_URL:-https://api.docuseal.co}
      DOCUSEAL_SIGNING_URL: ${DOCUSEAL_SIGNING_URL:-https://docuseal.co}
      # Payments
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Storage
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-catering-uploads}
      # Notifications
      NOTIFICATION_MOCK: ${NOTIFICATION_MOCK:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      # Features
      VECTOR_ENABLED: ${VECTOR_ENABLED:-false}
      CLAM_AV_ENABLED: ${CLAM_AV_ENABLED:-false}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    restart: unless-stopped

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are baked into the Next.js bundle at build time — must point to
        # your public-facing backend/ML URLs (e.g. behind an ALB or nginx).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_ML_API_URL: ${NEXT_PUBLIC_ML_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Workers (BullMQ / Puppeteer PDF) ────────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}?connection_limit=5
      REDIS_URL: ${REDIS_URL}
      NODE_ENV: production
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      NOTIFICATION_MOCK: ${NOTIFICATION_MOCK:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      CLAM_AV_ENABLED: ${CLAM_AV_ENABLED:-false}
      VECTOR_ENABLED: ${VECTOR_ENABLED:-false}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-5}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      - backend
    restart: unless-stopped

  # ─── ML Agent (FastAPI / LangGraph) ──────────────────────────────────────
  ml-agent:
    build:
      context: ./ml-agent
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      HOST: 0.0.0.0
      PORT: '8000'
    depends_on:
      - backend
    restart: unless-stopped
