services:
  postgres:
    image: postgres:16-alpine
    container_name: catering-db-local
    environment:
      POSTGRES_USER: cateringco
      POSTGRES_PASSWORD: local_dev_password
      POSTGRES_DB: cateringco_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cateringco"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - catering-network

  redis:
    image: redis:7-alpine
    container_name: catering-redis-local
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - catering-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catering-backend-local
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://cateringco:local_dev_password@postgres:5432/cateringco_dev
      BACKEND_PORT: 3001
      REDIS_URL: redis://redis:6379
      DOCUSEAL_ENABLED: ${DOCUSEAL_ENABLED:-false}
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:-}
      DOCUSEAL_API_URL: ${DOCUSEAL_API_URL:-https://api.docuseal.co}
      DOCUSEAL_SIGNING_URL: ${DOCUSEAL_SIGNING_URL:-https://docuseal.co}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/nest-cli.json:/app/nest-cli.json
    command: npm run start:dev
    networks:
      - catering-network

  ml-agent:
    build:
      context: ./ml-agent
      dockerfile: Dockerfile
    container_name: catering-ml-agent-local
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DATABASE_URL: postgresql://cateringco:local_dev_password@postgres:5432/cateringco_dev
      # Model selection comes from the repo-root `.env` (compose interpolation),
      # and is passed through explicitly into the container.
      ML_MODEL_EXTRACT: ${ML_MODEL_EXTRACT:-gpt-4.1-nano}
      ML_MODEL_ROUTER: ${ML_MODEL_ROUTER:-gpt-4.1-mini}
      ML_MODEL_RESPONSE: ${ML_MODEL_RESPONSE:-gpt-4.1-mini}
      ML_MODEL_WARMUP: ${ML_MODEL_WARMUP:-gpt-4.1-nano}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./ml-agent:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - catering-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: catering-frontend-local
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_ML_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/pages:/app/pages
      - ./frontend/public:/app/public
    command: npm run dev
    networks:
      - catering-network

volumes:
  postgres_data:

networks:
  catering-network:
    driver: bridge
