version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-localDB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema_final.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev']
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://dev:devpass@postgres:5432/localDB
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecret_replace_me
      STRIPE_ENABLED: 'false'
      CORS_ORIGIN: http://localhost:3000
      BACKEND_PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend

  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      DATABASE_URL: postgresql://dev:devpass@postgres:5432/localDB?connection_limit=5
      REDIS_URL: redis://redis:6379
      STRIPE_ENABLED: 'false'
      NOTIFICATION_MOCK: 'true'
      CLAM_AV_ENABLED: 'false'
      VECTOR_ENABLED: 'false'
      WORKER_MAX_RETRIES: '5'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
