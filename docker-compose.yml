version: '3.8'

services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: catering-db-local
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: localDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d localDB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - catering-network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: catering-redis-local
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - catering-network

  # ── Vector DB ───────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: catering-qdrant-local
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - catering-network

  # ── Schema migration (runs once, exits) ────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catering-migrate
    environment:
      DATABASE_URL: postgresql://dev:devpass@postgres:5432/localDB
    command: npx prisma db push --skip-generate
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - catering-network

  # ── Backend (NestJS) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catering-backend-local
    ports:
      - "3001:3001"
    env_file: ./backend/.env
    environment:
      # Override localhost→postgres for Docker networking
      DATABASE_URL: postgresql://dev:devpass@postgres:5432/localDB
      QDRANT_URL: http://qdrant:6333
      GMAIL_REDIRECT_URI: http://localhost:3001/api/gmail/callback
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    networks:
      - catering-network

  # ── Workers (pg-boss) ───────────────────────────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    container_name: catering-workers-local
    env_file: ./workers/.env
    environment:
      DATABASE_URL: postgresql://dev:devpass@postgres:5432/localDB
      QDRANT_URL: http://qdrant:6333
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    networks:
      - catering-network

  # ── ML Agent (FastAPI) ──────────────────────────────────────────────────────
  ml-agent:
    build:
      context: ./ml-agent
      dockerfile: Dockerfile
    container_name: catering-ml-agent-local
    ports:
      - "8000:8000"
    env_file: ./ml-agent/.env
    environment:
      DATABASE_URL: postgresql://dev:devpass@postgres:5432/localDB
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./ml-agent:/app
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - catering-network

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: catering-frontend-local
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_ML_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/public:/app/public
      - ./frontend/components:/app/components
      - ./frontend/hooks:/app/hooks
      - ./frontend/lib:/app/lib
      - ./frontend/types:/app/types
      - ./frontend/middleware.ts:/app/middleware.ts
    command: npm run dev
    networks:
      - catering-network

volumes:
  postgres_data:
  qdrant_data:

networks:
  catering-network:
    driver: bridge
