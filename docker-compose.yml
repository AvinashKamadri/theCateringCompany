

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
      POSTGRES_DB: ${POSTGRES_DB:-localDB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-localDB}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend (NestJS) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-devpass}@postgres:5432/${POSTGRES_DB:-localDB}
      REDIS_URL: redis://redis:6379
      BACKEND_PORT: '3001'
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-supersecret_replace_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecret_refresh_replace_in_prod}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # E-signature
      DOCUSEAL_ENABLED: ${DOCUSEAL_ENABLED:-false}
      DOCUSEAL_API_KEY: ${DOCUSEAL_API_KEY:-}
      DOCUSEAL_API_URL: ${DOCUSEAL_API_URL:-https://api.docuseal.co}
      DOCUSEAL_SIGNING_URL: ${DOCUSEAL_SIGNING_URL:-https://docuseal.co}
      # Payments
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Storage
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-catering-uploads}
      # Notifications
      NOTIFICATION_MOCK: ${NOTIFICATION_MOCK:-true}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@example.com}
      # Features
      VECTOR_ENABLED: ${VECTOR_ENABLED:-false}
      CLAM_AV_ENABLED: ${CLAM_AV_ENABLED:-false}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_ML_API_URL: ${NEXT_PUBLIC_ML_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_ML_API_URL: ${NEXT_PUBLIC_ML_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Workers (BullMQ / Puppeteer PDF) ────────────────────────────────────
  workers:
    build:
      context: .
      dockerfile: workers/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-devpass}@postgres:5432/${POSTGRES_DB:-localDB}?connection_limit=5
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-production}
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      NOTIFICATION_MOCK: ${NOTIFICATION_MOCK:-true}
      CLAM_AV_ENABLED: ${CLAM_AV_ENABLED:-false}
      VECTOR_ENABLED: ${VECTOR_ENABLED:-false}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-5}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── ML Agent (FastAPI / LangGraph) ──────────────────────────────────────
  ml-agent:
    build:
      context: ./ml-agent
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dev}:${POSTGRES_PASSWORD:-devpass}@postgres:5432/${POSTGRES_DB:-localDB}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-gpt-4o-mini}
      HOST: 0.0.0.0
      PORT: '8000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:
