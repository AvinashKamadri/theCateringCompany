<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Catering Company - Test Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; }

  /* Sidebar */
  .sidebar { width: 250px; background: #1a1a2e; color: #fff; padding: 16px; display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar .logo { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #e8b44d; }
  #new-chat { background: #e8b44d; color: #1a1a2e; border: none; border-radius: 8px; padding: 10px; font-size: 13px; cursor: pointer; font-weight: 600; margin-bottom: 16px; }
  #new-chat:hover { background: #d4a43e; }
  #node-badge { background: #2a2a4a; padding: 6px 10px; border-radius: 6px; font-size: 11px; color: #e8b44d; margin-bottom: 12px; text-align: center; }
  .sidebar h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 8px; }
  #slot-list { list-style: none; flex: 1; overflow-y: auto; }
  #slot-list li { padding: 5px 8px; margin-bottom: 2px; border-radius: 4px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  #slot-list li .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  #slot-list li .dot.empty { background: #444; }
  #slot-list li .dot.filled { background: #4caf50; }
  #slot-list li .val { color: #aaa; font-size: 11px; margin-left: auto; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .progress-bar { height: 5px; background: #333; border-radius: 3px; margin-top: 12px; }
  .progress-bar .fill { height: 100%; background: #e8b44d; border-radius: 3px; transition: width 0.4s; }
  .progress-text { font-size: 11px; color: #666; margin-top: 4px; text-align: center; }

  /* Main content: chat + menu panel */
  .main { flex: 1; display: flex; flex-direction: column; }

  /* Tab bar */
  .tab-bar { background: #fff; border-bottom: 1px solid #ddd; display: flex; padding: 0 16px; }
  .tab-bar button { background: none; border: none; padding: 12px 20px; font-size: 14px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; }
  .tab-bar button.active { color: #1a1a2e; border-bottom-color: #e8b44d; font-weight: 600; }
  .tab-bar button:hover { color: #1a1a2e; }

  /* Chat panel */
  .panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  #messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 72%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
  .msg.bot { background: #fff; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .msg.user { background: #1a1a2e; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .msg.system { background: #fff3cd; color: #856404; align-self: center; font-size: 12px; border-radius: 8px; max-width: 90%; }
  .msg.contract { background: #fff; max-width: 92%; font-family: 'Georgia', serif; font-size: 13px; border: 1px solid #ddd; }
  .typing { align-self: flex-start; color: #999; font-size: 13px; padding: 6px 0; }
  .input-area { background: #fff; padding: 12px 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
  #input { flex: 1; border: 1px solid #ddd; border-radius: 24px; padding: 10px 18px; font-size: 14px; outline: none; }
  #input:focus { border-color: #1a1a2e; }
  #send-btn { background: #1a1a2e; color: #fff; border: none; border-radius: 24px; padding: 10px 20px; font-size: 14px; cursor: pointer; }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Menu panel */
  .menu-panel { padding: 16px 20px; overflow-y: auto; }
  .menu-panel h3 { color: #1a1a2e; margin: 16px 0 8px; font-size: 15px; border-bottom: 2px solid #e8b44d; padding-bottom: 4px; }
  .menu-panel h3:first-child { margin-top: 0; }

  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .menu-card { background: #fff; border: 2px solid #e8e8e8; border-radius: 10px; padding: 12px; cursor: pointer; transition: all 0.2s; position: relative; }
  .menu-card:hover { border-color: #e8b44d; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .menu-card.selected { border-color: #1a1a2e; background: #f8f6f0; }
  .menu-card .card-name { font-weight: 600; font-size: 13px; color: #1a1a2e; margin-bottom: 4px; }
  .menu-card .card-price { color: #e8b44d; font-weight: 700; font-size: 14px; }
  .menu-card .card-desc { font-size: 11px; color: #888; margin-top: 4px; line-height: 1.4; max-height: 40px; overflow: hidden; }
  .menu-card .card-tags { margin-top: 4px; }
  .menu-card .tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #e8f5e9; color: #388e3c; margin-right: 3px; }
  .menu-card .check { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .menu-card.selected .check { background: #1a1a2e; border-color: #1a1a2e; color: #fff; }

  /* Pricing panel */
  .pricing-panel { padding: 16px 20px; overflow-y: auto; }
  .pricing-config { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .pricing-config label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  .pricing-config input, .pricing-config select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
  #calc-btn { background: #e8b44d; color: #1a1a2e; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 16px; }
  #calc-btn:hover { background: #d4a43e; }
  #send-selection-btn { background: #1a1a2e; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; cursor: pointer; margin-left: 10px; }

  .pricing-result { background: #fff; border-radius: 10px; padding: 16px; border: 1px solid #ddd; }
  .pricing-result h4 { font-size: 14px; color: #1a1a2e; margin-bottom: 10px; }
  .pricing-result table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .pricing-result table td { padding: 4px 8px; border-bottom: 1px solid #f0f0f0; }
  .pricing-result table td:last-child { text-align: right; font-weight: 600; }
  .pricing-result .total-row td { border-top: 2px solid #1a1a2e; font-weight: 700; font-size: 15px; padding-top: 8px; }
  .pricing-result .sub-row td { color: #888; font-size: 12px; }
  .selected-summary { background: #f8f6f0; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 12px; color: #666; }
  .selected-summary strong { color: #1a1a2e; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">The Catering Co.</div>
  <button id="new-chat">+ New Conversation</button>
  <div id="node-badge">Node: waiting...</div>
  <h2>Slots</h2>
  <ul id="slot-list"></ul>
  <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
  <div class="progress-text" id="progress-text">0 / 0 slots</div>
</div>

<div class="main">
  <div class="tab-bar">
    <button class="active" data-tab="chat">Chat</button>
    <button data-tab="menu">Menu Cards</button>
    <button data-tab="pricing">Pricing Calculator</button>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel" class="panel active" data-panel="chat">
    <div id="messages"></div>
    <div class="input-area">
      <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <!-- Menu Panel -->
  <div id="menu-panel" class="panel" data-panel="menu">
    <div class="menu-panel" id="menu-content">
      <p style="color:#888;">Loading menu...</p>
    </div>
  </div>

  <!-- Pricing Panel -->
  <div id="pricing-panel" class="panel" data-panel="pricing">
    <div class="pricing-panel">
      <div class="pricing-config">
        <div>
          <label>Guest Count</label>
          <input type="number" id="pc-guests" value="100" min="1" />
        </div>
        <div>
          <label>Event Type</label>
          <select id="pc-event">
            <option value="Wedding">Wedding</option>
            <option value="Corporate">Corporate</option>
            <option value="Birthday">Birthday</option>
            <option value="Social">Social</option>
            <option value="Custom">Custom</option>
          </select>
        </div>
        <div>
          <label>Service Type</label>
          <select id="pc-service">
            <option value="on-site">On-site</option>
            <option value="drop-off">Drop-off</option>
          </select>
        </div>
      </div>
      <div class="selected-summary" id="selected-summary">No items selected. Go to <strong>Menu Cards</strong> tab to select items.</div>
      <div>
        <button id="calc-btn">Calculate Pricing</button>
        <button id="send-selection-btn">Send Selections to Chat</button>
      </div>
      <div id="pricing-result" class="pricing-result" style="margin-top:16px;display:none;"></div>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let threadId = null;
let projectId = crypto.randomUUID();
let menuData = {};          // category -> items[]
let selectedItems = {};     // itemName -> {item, category}

// DOM
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const slotList = document.getElementById('slot-list');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const nodeBadge = document.getElementById('node-badge');

// ---- Tabs ----
document.querySelectorAll('.tab-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.querySelector(`[data-panel="${btn.dataset.tab}"]`).classList.add('active');
  });
});

// ---- Chat ----
function addMessage(text, type = 'bot') {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typing-indicator';
  div.textContent = 'Agent is typing...';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing-indicator')?.remove(); }

function updateSlots(tid) {
  if (!tid) return;
  fetch(`${API}/conversation/${tid}/slots`).then(r=>r.json()).then(data => {
    slotList.innerHTML = '';
    const slots = data.filled || {};
    Object.entries(slots).forEach(([name, val]) => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="dot filled"></span><span>${name.replace(/_/g,' ')}</span><span class="val" title="${val}">${val}</span>`;
      slotList.appendChild(li);
    });
    (data.unfilled || []).forEach(name => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="dot empty"></span><span>${name.replace(/_/g,' ')}</span>`;
      slotList.appendChild(li);
    });
  }).catch(()=>{});
}

async function sendMessage(overrideMsg) {
  const msg = overrideMsg || inputEl.value.trim();
  if (!msg) return;
  if (!overrideMsg) inputEl.value = '';
  sendBtn.disabled = true;
  addMessage(msg, 'user');
  showTyping();

  try {
    const body = { message: msg, project_id: projectId };
    if (threadId) body.thread_id = threadId;
    const res = await fetch(`${API}/chat`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    hideTyping();
    if (!res.ok) { addMessage(`Error ${res.status}: ${await res.text()}`, 'system'); return; }

    const data = await res.json();
    threadId = data.thread_id;
    nodeBadge.textContent = `Node: ${data.current_node || '?'}`;
    const filled = data.slots_filled || 0, total = data.total_slots || 1;
    progressFill.style.width = `${Math.round(filled/total*100)}%`;
    progressText.textContent = `${filled} / ${total} slots`;
    addMessage(data.message, 'bot');
    updateSlots(threadId);

    if (data.is_complete && data.contract_id) {
      addMessage('Contract generated!', 'system');
      try {
        const cr = await fetch(`${API}/contract/${data.contract_id}`);
        if (cr.ok) {
          const contract = await cr.json();
          const bd = contract.body || {};
          if (bd.pricing) {
            const p = bd.pricing;
            let s = `BILLING SUMMARY\n${'='.repeat(40)}\n`;
            (p.line_items||[]).forEach(li => { s += `${li.name}: $${li.total.toFixed(2)}\n`; });
            s += `${'='.repeat(40)}\nSubtotal: $${p.subtotal_before_fees.toFixed(2)}\n`;
            s += `9.4% Tax: $${p.tax.toFixed(2)}\n20% Gratuity: $${p.gratuity.toFixed(2)}\n`;
            s += `TOTAL: $${p.grand_total.toFixed(2)}\nDeposit (50%): $${p.deposit.toFixed(2)}`;
            addMessage(s, 'system');
          }
          addMessage(bd.contract_text || JSON.stringify(bd,null,2), 'contract');
        }
      } catch(e) { console.error(e); }
    }
  } catch(err) { hideTyping(); addMessage(`Network error: ${err.message}`, 'system'); }
  finally { sendBtn.disabled = false; inputEl.focus(); }
}

sendBtn.addEventListener('click', () => sendMessage());
inputEl.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }});

document.getElementById('new-chat').addEventListener('click', () => {
  threadId = null; projectId = crypto.randomUUID();
  messagesEl.innerHTML = ''; slotList.innerHTML = '';
  progressFill.style.width = '0%'; progressText.textContent = '0 / 0 slots';
  nodeBadge.textContent = 'Node: waiting...';
  selectedItems = {}; updateSelectedSummary(); renderMenu();
  addMessage('New conversation started. Say hello!', 'system');
});

addMessage('Welcome! Start chatting, or browse the Menu Cards tab to select items.', 'system');

// ---- Menu Cards ----
async function loadMenu() {
  try {
    const res = await fetch(`${API}/menu`);
    const data = await res.json();
    menuData = data.categories || {};
    renderMenu();
  } catch(e) {
    document.getElementById('menu-content').innerHTML = '<p style="color:red;">Failed to load menu.</p>';
  }
}

function renderMenu() {
  const container = document.getElementById('menu-content');
  container.innerHTML = '';
  for (const [category, items] of Object.entries(menuData)) {
    const h3 = document.createElement('h3');
    h3.textContent = category;
    container.appendChild(h3);

    const grid = document.createElement('div');
    grid.className = 'menu-grid';
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = `menu-card ${selectedItems[item.name] ? 'selected' : ''}`;
      const priceStr = item.unit_price ? `$${parseFloat(item.unit_price).toFixed(2)}/${item.price_type === 'per_person' ? 'pp' : 'flat'}` : '';
      const descStr = item.description ? `<div class="card-desc">${item.description}</div>` : '';
      const tags = (item.tags || []).filter(t => t);
      const tagStr = tags.length ? `<div class="card-tags">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>` : '';

      card.innerHTML = `
        <div class="check">${selectedItems[item.name] ? '&#10003;' : ''}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-price">${priceStr}</div>
        ${descStr}${tagStr}
      `;
      card.addEventListener('click', () => toggleItem(item, category));
      grid.appendChild(card);
    });
    container.appendChild(grid);
  }
}

function toggleItem(item, category) {
  if (selectedItems[item.name]) {
    delete selectedItems[item.name];
  } else {
    selectedItems[item.name] = { item, category };
  }
  renderMenu();
  updateSelectedSummary();
}

function updateSelectedSummary() {
  const el = document.getElementById('selected-summary');
  const names = Object.keys(selectedItems);
  if (names.length === 0) {
    el.innerHTML = 'No items selected. Go to <strong>Menu Cards</strong> tab to select items.';
    return;
  }
  // Group by category
  const groups = {};
  for (const [name, {category}] of Object.entries(selectedItems)) {
    (groups[category] = groups[category] || []).push(name);
  }
  let html = `<strong>${names.length} items selected:</strong><br>`;
  for (const [cat, items] of Object.entries(groups)) {
    html += `<em>${cat}:</em> ${items.join(', ')}<br>`;
  }
  el.innerHTML = html;
}

// ---- Pricing Calculator ----
document.getElementById('calc-btn').addEventListener('click', async () => {
  const guests = parseInt(document.getElementById('pc-guests').value) || 100;
  const eventType = document.getElementById('pc-event').value;
  const serviceType = document.getElementById('pc-service').value;

  // Build selections from selected cards
  const dishes = [], appetizers = [], desserts = [];
  for (const [name, {item, category}] of Object.entries(selectedItems)) {
    const cat = category.toLowerCase();
    if (cat.includes('dessert') || cat.includes('coffee') || cat.includes('cake')) {
      desserts.push(name);
    } else if (cat.includes('platter') || cat.includes('appetizer')) {
      appetizers.push(name);
    } else {
      dishes.push(name);
    }
  }

  try {
    const res = await fetch(`${API}/pricing/calculate`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        guest_count: guests,
        event_type: eventType,
        service_type: serviceType,
        selected_dishes: dishes.join(', ') || null,
        appetizers: appetizers.join(', ') || null,
        desserts: desserts.join(', ') || null,
      })
    });
    const p = await res.json();
    renderPricing(p);
  } catch(e) {
    document.getElementById('pricing-result').innerHTML = `<p style="color:red;">Error: ${e.message}</p>`;
    document.getElementById('pricing-result').style.display = 'block';
  }
});

function renderPricing(p) {
  const el = document.getElementById('pricing-result');
  el.style.display = 'block';

  let rows = '';
  (p.line_items || []).forEach(li => {
    const desc = li.description ? ` <span style="color:#999;font-size:11px;">— ${li.description.slice(0,60)}</span>` : '';
    const priceLabel = li.price_type === 'per_person' ? `$${li.unit_price.toFixed(2)}pp x ${li.quantity}` : 'flat';
    rows += `<tr><td>${li.name}${desc}</td><td>${priceLabel}</td><td>$${li.total.toFixed(2)}</td></tr>`;
  });

  const pkg = p.package;
  const pkgRow = pkg ? `<tr class="sub-row"><td colspan="2">Package: ${pkg.name} ($${pkg.per_person_rate.toFixed(2)}pp x ${p.guest_count})</td><td>$${pkg.package_base_total.toFixed(2)}</td></tr>` : '';

  el.innerHTML = `
    <h4>Pricing Breakdown</h4>
    <table>
      ${rows}
      ${pkgRow}
      <tr style="border-top:1px solid #ddd;"><td colspan="2">Food & Menu Subtotal</td><td>$${p.food_subtotal.toFixed(2)}</td></tr>
      <tr><td colspan="2">Menu Total (max of items vs package)</td><td>$${p.menu_total.toFixed(2)}</td></tr>
      <tr><td colspan="2">Service/Labor Surcharge</td><td>$${p.service_surcharge.toFixed(2)}</td></tr>
      <tr style="border-top:1px solid #ddd;"><td colspan="2"><strong>Subtotal</strong></td><td><strong>$${p.subtotal_before_fees.toFixed(2)}</strong></td></tr>
      <tr class="sub-row"><td colspan="2">9.4% Tax</td><td>$${p.tax.toFixed(2)}</td></tr>
      <tr class="sub-row"><td colspan="2">20% Service & Gratuity</td><td>$${p.gratuity.toFixed(2)}</td></tr>
      <tr class="total-row"><td colspan="2">GRAND TOTAL</td><td>$${p.grand_total.toFixed(2)}</td></tr>
      <tr class="sub-row"><td colspan="2">Deposit Due (50%)</td><td>$${p.deposit.toFixed(2)}</td></tr>
      <tr class="sub-row"><td colspan="2">Balance Due</td><td>$${p.balance.toFixed(2)}</td></tr>
    </table>
  `;
}

// Send selections to chat
document.getElementById('send-selection-btn').addEventListener('click', () => {
  const names = Object.keys(selectedItems);
  if (names.length === 0) { alert('Select items from Menu Cards first!'); return; }

  // Build a natural message with selections
  const groups = {};
  for (const [name, {category}] of Object.entries(selectedItems)) {
    (groups[category] = groups[category] || []).push(name);
  }
  let msg = "I'd like these items: ";
  const parts = [];
  for (const [cat, items] of Object.entries(groups)) {
    parts.push(`${items.join(', ')}`);
  }
  msg += parts.join(', ');

  // Switch to chat tab and send
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="chat"]').classList.add('active');
  document.querySelector('[data-panel="chat"]').classList.add('active');
  sendMessage(msg);
});

// Init
loadMenu();
inputEl.focus();
</script>
</body>
</html>
